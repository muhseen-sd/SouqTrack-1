<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SouqTrack</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="SouqTrack.png" type="image/x-icon">

</head>
<body>

    <header>
        <img src="SouqTrack.png" alt="SouqTrack logo" id="logo">
        <h1>SouqTrack</h1>
    </header>
    

    <div id="notifications"></div>

    <div id="controls">
        <input type="text" id="coin-input" placeholder="Enter coin id (e.g bitcoin)"/>
        <button id="add-btn">Add Coin</button>
    </div>
    

    <div id="watchlist">
        <p id="empty-state">No coins yet. Try adding "bitcoin" or "ethereum" above!</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
